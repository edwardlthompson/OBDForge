version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Android-only child repo — do not scan pruned web/node/python stacks
  - package-ecosystem: gradle
    directory: /examples/android
    schedule:
      interval: weekly
    groups:
      android-dependencies:
        patterns: ["*"]
    # CodeQL Java extractor supports Kotlin < 2.4.10 only (KB-019). Revisit when CodeQL catches up.
    ignore:
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions: [">=2.4.10"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.4.10"]
      - dependency-name: "org.jetbrains.kotlin:kotlin-test"
        versions: [">=2.4.10"]
