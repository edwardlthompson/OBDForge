version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /examples/web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /examples/node
    schedule:
      interval: weekly
    groups:
      node-dependencies:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /examples/python
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: /examples/android
    schedule:
      interval: weekly
    groups:
      android-dependencies:
        patterns: ["*"]
    # CodeQL Java extractor supports Kotlin < 2.4.10 only (KB-019). Revisit when CodeQL catches up.
    ignore:
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions: [">=2.4.10"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.4.10"]
      - dependency-name: "org.jetbrains.kotlin:kotlin-test"
        versions: [">=2.4.10"]
