name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Changelog and release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        id: release
        with:
          # Prefer AUTOMERGE_TOKEN (PAT) so created PRs / merges trigger push CI
          token: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Sync template version files on release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
          RP_PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          if [ -z "${RP_PR_JSON}" ] || [ "${RP_PR_JSON}" = "null" ]; then
            echo "No PR JSON from Release Please; skip sync"
            exit 0
          fi
          PR_NUMBER="$(python3 -c 'import json,os; print(json.loads(os.environ["RP_PR_JSON"])["number"])')"
          gh pr checkout "$PR_NUMBER"
          # Child repos: sync-template-version.sh is a no-op for .template-version (app vs template semver)
          bash scripts/sync-template-version.sh
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .template-version TEMPLATE_INDEX.json README.md AGENT_MEMORY.md
            git commit -m "chore: sync template version files for release PR"
            git push origin HEAD
          fi

      - name: Trigger SBOM asset upload
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f "tag=${{ steps.release.outputs.tag_name }}"
