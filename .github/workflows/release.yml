name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload (e.g. v1.2.3); defaults to v.template-version
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  tag-gate:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Tag gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches .template-version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(tr -d '[:space:]' < .template-version)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match .template-version ($VERSION)"
            exit 1
          fi

      - name: Poll required CI checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-github-ci.sh HEAD --wait 300

  release-apk:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    name: Build and upload signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag != '' && github.ref || steps.tag.outputs.tag || github.ref }}

      - name: Finalize release tag from .template-version
        if: steps.tag.outputs.tag == ''
        id: tag_ver
        run: echo "tag=v$(tr -d '[:space:]' < .template-version)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches .template-version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            EFFECTIVE="${{ inputs.tag }}"
          else
            EFFECTIVE="${{ steps.tag.outputs.tag || steps.tag_ver.outputs.tag }}"
          fi
          TAG="${EFFECTIVE#v}"
          VERSION=$(tr -d '[:space:]' < .template-version)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match .template-version ($VERSION)"
            exit 1
          fi
          echo "EFFECTIVE_TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Poll post-merge CI before release build
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-github-ci.sh HEAD --wait 3600

      - uses: actions/setup-java@v5
        if: hashFiles('examples/android/app/build.gradle.kts') != ''
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        if: hashFiles('examples/android/app/build.gradle.kts') != ''

      - name: Accept Android SDK licenses
        if: hashFiles('examples/android/app/build.gradle.kts') != ''
        run: yes | sdkmanager --licenses

      - name: Build reproducible release APK
        if: hashFiles('examples/android/app/build.gradle.kts') != ''
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: bash scripts/build-release-apk.sh --clean

      - name: Sign release APK (stable keystore required)
        if: hashFiles('examples/android/app/build.gradle.kts') != ''
        env:
          OBDFORGE_KEYSTORE_BASE64: ${{ secrets.OBDFORGE_KEYSTORE_BASE64 }}
          OBDFORGE_KEYSTORE_PASSWORD: ${{ secrets.OBDFORGE_KEYSTORE_PASSWORD }}
          OBDFORGE_KEY_ALIAS: ${{ secrets.OBDFORGE_KEY_ALIAS }}
          OBDFORGE_KEY_PASSWORD: ${{ secrets.OBDFORGE_KEY_PASSWORD }}
        run: |
          bash scripts/ensure-release-signing-secrets.sh
          UNSIGNED="examples/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="examples/android/app/build/outputs/apk/release/app-release-signed.apk"
          VERSION="$(tr -d '[:space:]' < .template-version)"
          INSTALLABLE="examples/android/app/build/outputs/apk/release/OBDForge-${VERSION}.apk"
          echo "${OBDFORGE_KEYSTORE_BASE64}" | base64 -d > /tmp/obdforge-release.keystore
          export OBDFORGE_KEYSTORE_PATH=/tmp/obdforge-release.keystore
          export OBDFORGE_KEY_ALIAS="${OBDFORGE_KEY_ALIAS:-obdforge}"
          bash scripts/sign-release-apk.sh "$UNSIGNED" "$SIGNED"
          cp "$SIGNED" "$INSTALLABLE"
          BT="$(find "${ANDROID_HOME}/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)"
          "${BT}/apksigner" verify --verbose "$INSTALLABLE"
          echo "Installable APK: $INSTALLABLE"

      - name: Upload signed APK only to GitHub Release
        if: hashFiles('examples/android/app/build.gradle.kts') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${EFFECTIVE_TAG:-${{ steps.tag.outputs.tag || steps.tag_ver.outputs.tag }}}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "FAIL: release $TAG not found (create GitHub release first)"
            exit 1
          fi
          VERSION="$(tr -d '[:space:]' < .template-version)"
          INSTALLABLE="examples/android/app/build/outputs/apk/release/OBDForge-${VERSION}.apk"
          if [ ! -f "$INSTALLABLE" ]; then
            echo "FAIL: $INSTALLABLE not found"
            exit 1
          fi
          gh release upload "$TAG" "$INSTALLABLE" --clobber
